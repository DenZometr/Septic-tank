esphome:
  name: septik
  friendly_name: Septik

esp8266:
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "40256427b74476f18b9b89d99e42b2de"

wifi:
  min_auth_mode: WPA2
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Septik Fallback Hotspot"

captive_portal:

binary_sensor:
  - platform: gpio
    id: sensor_1
    name: "Sensor Bak"
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: True

  - platform: gpio
    id: sensor_2
    name: "Sensor Nasos"
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: true
      inverted: True

  - platform: gpio
    id: sensor_3
    name: "Kompressor 1"
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
      inverted: True

  - platform: gpio
    id: sensor_4
    name: "Kompressor 2"
    pin:
      number: GPIO12
      mode:
        input: true
        pullup: true
      inverted: True

button:
  - platform: restart
    name: "Reboot"

text_sensor:
  - platform: uptime
    name: Uptime
    update_interval: 60s
    format:
      days: Д
      hours: Ч
      minutes: М
      seconds: С
      separator: " "

sensor:
  - platform: wifi_signal
    name: "WI-FI RSSI"
    id: rssi
    update_interval: 20s